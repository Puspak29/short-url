services:
  short-url-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: short-url-server
    ports:
      - "8000:8000"
    env_file:
      - .env.test.local
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    restart: unless-stopped
    
volumes:
  node_modules: